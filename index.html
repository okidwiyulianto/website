<html lang="en">
<head>

<body>
    <div id="terminal">
        <div id="terminal-header">
            <div class="window-title">root@localhost:~</div>

                <div class="control-button" id="minimize"></div>
                <div class="control-button" id="restore"></div>
                <div class="control-button" id="close"></div>
            </div>
            <div class="menu-bar">
                <div class="menu-item">File</div>
                <div class="menu-item">Edit</div>
                <div class="menu-item">View</div>
                <div class="menu-item">Search</div>
                <div class="menu-item">Terminal</div>
                <div class="menu-item">Help</div>
            </div>
        </div>
        <div id="terminal-content">
            <div id="output">Welcome to Oki Dwi Yulianto Personal Website<br>Type one of the commands below for showing the information<br>Available commands: home, about, blog, help<br><br></div>
            <div id="input-line">
                <span id="prompt">root@localhost:</span><span id="user">~$</span>
                <input type="text" id="command-input" autofocus>
            </div>
        </div>
    </div>
    <script src="js/index.js"></script>
